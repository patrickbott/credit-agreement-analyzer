worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    # ------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------
    gzip            on;
    gzip_types      text/html application/json text/css application/javascript;
    gzip_min_length 256;

    # ------------------------------------------------------------
    # Upstream: Streamlit app container
    # ------------------------------------------------------------
    upstream streamlit {
        server credit-analyzer-app:8501;
    }

    server {
        listen 80;

        # Allow large PDF uploads
        client_max_body_size 50M;

        # --------------------------------------------------------
        # Health-check endpoint (no auth) -- used by Docker
        # --------------------------------------------------------
        location /_stcore/health {
            auth_basic off;
            proxy_pass http://streamlit/_stcore/health;
        }

        # --------------------------------------------------------
        # Default location -- all other traffic
        # --------------------------------------------------------
        location / {
            # HTTP Basic Auth
            auth_basic           "Credit Analyzer";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # Proxy to Streamlit
            proxy_pass http://streamlit;

            # Standard proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (required by Streamlit)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts -- LLM calls can be slow
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }

        # --------------------------------------------------------
        # Streamlit WebSocket stream endpoint
        # --------------------------------------------------------
        location /_stcore/stream {
            auth_basic           "Credit Analyzer";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://streamlit/_stcore/stream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade -- mandatory for this endpoint
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long-lived connection; no read timeout
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
        }
    }
}
