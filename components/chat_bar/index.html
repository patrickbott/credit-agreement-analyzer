<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif;
    background: transparent;
    overflow: hidden;
  }

  .wrapper {
    max-width: 820px;
    margin: 0 auto;
    padding: 0.4rem 0 0.75rem;
  }

  /* ---- Active chips: above input, left-aligned ---- */
  .active-chips {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }
  .active-chips:empty { display: none; }

  /* ---- Input row ---- */
  .input-row {
    display: flex;
    align-items: flex-end;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 24px;
    padding: 0.4rem 0.4rem 0.4rem 1rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    gap: 0.35rem;
  }

  .input-row textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 0.92rem;
    color: #1A1A1A;
    background: transparent;
    line-height: 1.5;
    min-height: 1.5em;
    max-height: 8em;
    overflow-y: auto;
    padding: 0.35rem 0;
  }
  .input-row textarea::placeholder { color: #9CA3AF; }
  .input-row textarea:disabled { opacity: 0.5; }

  /* ---- Send / Stop buttons ---- */
  .btn-action {
    width: 2.5rem;
    height: 2.5rem;
    min-width: 2.5rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }
  .btn-send {
    background: #003DA5;
  }
  .btn-send:hover { background: #002D7A; }
  .btn-send:disabled { background: #A0AEC0; cursor: default; }

  .btn-stop {
    background: #FFD100;
  }
  .btn-stop:hover { background: #E6BC00; }

  .stop-icon {
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 2px;
  }

  /* ---- Inactive chips: below input, centered ---- */
  .inactive-chips {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.4rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .inactive-chips:empty { display: none; }

  /* ---- Chip base ---- */
  .chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.25rem 0.75rem;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    user-select: none;
    line-height: 1.4;
  }

  .chip-off {
    background: #FFFFFF;
    border-color: #E2E8F0;
    color: #64748B;
  }
  .chip-off:hover {
    border-color: #003DA5;
    color: #003DA5;
    background: rgba(0, 61, 165, 0.04);
  }

  .chip-on {
    background: #003DA5;
    border-color: #003DA5;
    color: white;
  }
  .chip-on:hover {
    background: #002D7A;
    border-color: #002D7A;
  }

  .chip-icon {
    width: 14px;
    height: 14px;
    margin-right: 5px;
    object-fit: contain;
  }
  .chip-off .chip-icon { opacity: 0.5; }
  .chip-off:hover .chip-icon { opacity: 0.8; }
  .chip-on .chip-icon { filter: brightness(0) invert(1); }
</style>
</head>
<body>
<div class="wrapper" id="wrapper">
  <div class="active-chips" id="active-chips"></div>
  <div class="input-row" id="input-row">
    <textarea id="input" rows="1" placeholder="Ask about pricing, covenants, structure..."></textarea>
    <button class="btn-action btn-send" id="send-btn" title="Send">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 19V5M5 12l7-7 7 7" stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="btn-action btn-stop" id="stop-btn" style="display:none" title="Stop generating">
      <div class="stop-icon"></div>
    </button>
  </div>
  <div class="inactive-chips" id="inactive-chips"></div>
</div>

<script>
/* -----------------------------------------------------------
   Streamlit V1 component protocol (no library dependency)
   ----------------------------------------------------------- */
function sendMsg(type, data) {
  window.parent.postMessage(
    Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
    "*"
  );
}
function setReady()        { sendMsg("streamlit:componentReady", { apiVersion: 1 }); }
function setHeight(h)      { sendMsg("streamlit:setFrameHeight", { height: h }); }
function setValue(v)        { sendMsg("streamlit:setComponentValue", { value: v }); }

/* -----------------------------------------------------------
   State
   ----------------------------------------------------------- */
var eventId = 0;
var _prevStreaming = false;

/* -----------------------------------------------------------
   Rendering
   ----------------------------------------------------------- */
function renderChips(chips) {
  var ac = document.getElementById("active-chips");
  var ic = document.getElementById("inactive-chips");
  ac.innerHTML = "";
  ic.innerHTML = "";

  (chips || []).forEach(function(chip) {
    var el = document.createElement("span");
    el.className = chip.active ? "chip chip-on" : "chip chip-off";

    var img = document.createElement("img");
    img.className = "chip-icon";
    img.src = chip.active ? chip.icon_on : chip.icon_off;
    img.draggable = false;
    el.appendChild(img);

    el.appendChild(document.createTextNode(chip.label));

    el.addEventListener("click", function() {
      setValue({ type: "toggle", chip: chip.id, active: !chip.active, _id: ++eventId });
    });

    if (chip.active) { ac.appendChild(el); }
    else             { ic.appendChild(el); }
  });
}

function render(args) {
  var input   = document.getElementById("input");
  var sendBtn = document.getElementById("send-btn");
  var stopBtn = document.getElementById("stop-btn");

  input.placeholder = args.placeholder || "Ask about pricing, covenants, structure...";
  input.disabled    = args.disabled || args.is_streaming;

  if (args.is_streaming) {
    sendBtn.style.display = "none";
    stopBtn.style.display = "flex";
  } else {
    sendBtn.style.display = "flex";
    stopBtn.style.display = "none";
    /* Focus input when streaming just ended */
    if (_prevStreaming) { setTimeout(function() { input.focus(); }, 50); }
  }
  _prevStreaming = args.is_streaming;

  /* Disable send when input is empty */
  sendBtn.disabled = !input.value.trim();

  renderChips(args.chips);
  adjustPosition();
  requestAnimationFrame(function() { setHeight(document.getElementById("wrapper").offsetHeight); });
}

/* -----------------------------------------------------------
   Position the component container at viewport bottom,
   accounting for the Streamlit sidebar width.
   ----------------------------------------------------------- */
function adjustPosition() {
  try {
    var frame = window.frameElement;
    if (!frame) return;
    /* Walk up to the .st-key-chat-bar container Streamlit wraps us in */
    var container = frame.closest("[class*='st-key-chat-bar']") || frame.parentElement;
    if (!container) return;

    var sidebar = parent.document.querySelector('[data-testid="stSidebar"]');
    var expanded = sidebar && sidebar.getAttribute("aria-expanded") === "true";
    var sidebarW = expanded ? sidebar.getBoundingClientRect().width : 0;

    container.style.cssText =
      "position:fixed !important;bottom:0;right:0;z-index:50;" +
      "left:" + sidebarW + "px;" +
      "background:#F0F0F0;";

    /* Also hide padding/margin Streamlit may add to the iframe wrapper */
    frame.parentElement.style.padding = "0";
    frame.parentElement.style.margin  = "0";

    /* Align wrapper to Streamlit's block-container content area so the
       input sits directly beneath the chat messages. */
    var bc = parent.document.querySelector('.block-container');
    var wrapper = document.getElementById("wrapper");
    if (bc && wrapper) {
      var bcRect = bc.getBoundingClientRect();
      var bcStyle = parent.getComputedStyle(bc);
      var padL = parseFloat(bcStyle.paddingLeft) || 0;
      var padR = parseFloat(bcStyle.paddingRight) || 0;
      var contentLeft = bcRect.left + padL;
      var contentWidth = bcRect.width - padL - padR;
      wrapper.style.maxWidth = contentWidth + "px";
      wrapper.style.marginLeft = (contentLeft - sidebarW) + "px";
      wrapper.style.marginRight = "0";
    }
  } catch(e) { /* cross-origin or sandbox — fall back to flow position */ }
}

/* Re-adjust when sidebar toggles */
var _resizeTimer;
function onResize() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(adjustPosition, 100);
}

/* -----------------------------------------------------------
   Event handlers
   ----------------------------------------------------------- */
document.getElementById("send-btn").addEventListener("click", function() {
  var input = document.getElementById("input");
  var text  = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  this.disabled = true;
  setValue({ type: "submit", text: text, _id: ++eventId });
});

document.getElementById("stop-btn").addEventListener("click", function() {
  setValue({ type: "stop", _id: ++eventId });
});

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("send-btn").click();
  }
});

/* Auto-resize textarea & toggle send button */
document.getElementById("input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 8 * 24) + "px";
  document.getElementById("send-btn").disabled = !this.value.trim();
  requestAnimationFrame(function() { setHeight(document.getElementById("wrapper").offsetHeight); });
});

/* -----------------------------------------------------------
   Init
   ----------------------------------------------------------- */
window.addEventListener("message", function(event) {
  if (event.data && event.data.type === "streamlit:render") {
    render(event.data.args);
  }
});

window.addEventListener("resize", onResize);

/* Observe sidebar attribute changes for expand/collapse */
try {
  var sb = parent.document.querySelector('[data-testid="stSidebar"]');
  if (sb) {
    new MutationObserver(adjustPosition).observe(sb, { attributes: true, attributeFilter: ["aria-expanded"] });
  }
} catch(e) {}

setReady();
</script>
</body>
</html>
